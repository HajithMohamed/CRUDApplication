<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">All Products</h1>

        <a th:href="@{/products/create}"
           class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
            + Create Product
        </a>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full border border-gray-200 rounded-lg overflow-hidden">

            <thead class="bg-gray-200 text-gray-700">
            <tr>
                <th class="py-2 px-4 border">ID</th>
                <th class="py-2 px-4 border">Name</th>
                <th class="py-2 px-4 border">Category</th>
                <th class="py-2 px-4 border">Description</th>
                <th class="py-2 px-4 border">Price</th>
                <th class="py-2 px-4 border">Image</th>
                <th class="py-2 px-4 border">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product : ${products}" class="hover:bg-gray-50">

                <td class="py-2 px-4 border" th:text="${product.id}"></td>
                <td class="py-2 px-4 border" th:text="${product.name}"></td>
                <td class="py-2 px-4 border" th:text="${product.category}"></td>
                <td class="py-2 px-4 border truncate max-w-xs" th:text="${product.description}"></td>
                <td class="py-2 px-4 border text-green-600 font-semibold"
                    th:text="'Rs. ' + ${product.price}"></td>

                <td class="py-2 px-4 border">
                    <img th:src="@{'/Product_Images/' + ${product.imageFileName}}"
                         alt="Product Image"
                         class="w-20 h-20 object-cover rounded-lg border"/>
                </td>

                <td class="py-2 px-4 border space-x-2">

                    <a th:href="@{'/products/edit/' + ${product.id}}"
                       class="bg-yellow-400 text-white px-3 py-1 rounded hover:bg-yellow-500 transition">
                        Edit
                    </a>

                    <a th:href="@{'/products/delete/' + ${product.id}}"
                       onclick="return confirm('Are you sure you want to delete this product?')"
                       class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
